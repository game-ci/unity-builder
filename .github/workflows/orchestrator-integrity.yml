  # ============================================================================
  # RCLONE TESTS
  # ============================================================================
  rclone-tests:
    name: Rclone Provider Tests
    runs-on: ubuntu-latest
    steps:
      # --- Setup ---
      - uses: actions/checkout@v4
        with:
          lfs: false
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Initial disk space cleanup
        run: |
          echo "Initial disk space cleanup..."
          docker system prune -af --volumes || true
          df -h

      - name: Start LocalStack
        run: |
          echo "Starting LocalStack for rclone S3 backend..."
          docker run -d \
            --name localstack-main \
            -p 4566:4566 \
            -e SERVICES=s3 \
            -e DEBUG=0 \
            localstack/localstack:latest || true
          echo "Waiting for LocalStack to be ready..."
          MAX_ATTEMPTS=60
          READY=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            if ! docker ps | grep -q localstack-main; then sleep 2; continue; fi
            HEALTH=$(curl -s http://localhost:4566/_localstack/health 2>/dev/null || echo "")
            if echo "$HEALTH" | grep -q '"s3"'; then
              echo "LocalStack is ready (attempt $i/$MAX_ATTEMPTS)"
              READY=true
              break
            fi
            sleep 2
          done
          if [ "$READY" != "true" ]; then
            echo "ERROR: LocalStack did not become ready"
            docker logs localstack-main --tail 100 || true
            exit 1
          fi

      - name: Install AWS CLI and create S3 bucket
        run: |
          if ! command -v aws > /dev/null 2>&1; then pip install awscli || true; fi
          pip install awscli-local || true
          MAX_RETRIES=5
          RETRY_COUNT=0
          BUCKET_CREATED=false
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$BUCKET_CREATED" != "true" ]; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if command -v awslocal > /dev/null 2>&1; then
              if awslocal s3 mb s3://$AWS_STACK_NAME 2>&1; then BUCKET_CREATED=true; else sleep 2; fi
            elif command -v aws > /dev/null 2>&1; then
              if aws --endpoint-url=http://localhost:4566 s3 mb s3://$AWS_STACK_NAME 2>&1; then BUCKET_CREATED=true; else sleep 2; fi
            else
              echo "Neither awslocal nor aws CLI available"; exit 1
            fi
          done
          if [ "$BUCKET_CREATED" != "true" ]; then
            echo "ERROR: Failed to create S3 bucket"; exit 1
          fi

      - name: Install and configure rclone with LocalStack S3
        run: |
          echo "Installing rclone..."
          curl https://rclone.org/install.sh | sudo bash
          rclone version

          echo "Configuring rclone to use LocalStack S3..."
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          [localstack-s3]
          type = s3
          provider = Other
          env_auth = false
          access_key_id = test
          secret_access_key = test
          endpoint = http://localhost:4566
          acl = private
          force_path_style = true
          EOF

          echo "Testing rclone configuration..."
          rclone lsd localstack-s3: || echo "No buckets yet (expected)"
          rclone ls localstack-s3:game-ci-team-pipelines || echo "Bucket may be empty"
          echo "Rclone configured successfully"

      - run: yarn install --frozen-lockfile

      # --- Rclone Test 1: orchestrator-rclone-steps ---
      - name: Run orchestrator-rclone-steps test
        timeout-minutes: 30
        run: yarn run test "orchestrator-rclone-steps" --detectOpenHandles --forceExit --runInBand
